<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard · Avaliador</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
<link rel="stylesheet" href="../shared/style.css" />
<script src="../shared/api.js"></script>
</head>
<body class="min-h-screen" x-data="reviewerDashboard()" x-init="load()">

  <div class="max-w-4xl mx-auto px-6 py-8">
    <header class="flex items-center justify-between mb-8">
      <div>
        <h1 class="font-display text-2xl font-semibold">Minhas avaliações</h1>
        <p class="text-[var(--muted)] text-sm mt-1" x-text="usuario?.nome"></p>
      </div>
      <button @click="logout()" class="btn-secondary text-sm">Sair</button>
    </header>

    <template x-if="carregando">
      <p class="text-[var(--muted)] text-sm">Carregando…</p>
    </template>

    <template x-if="erro">
      <div class="card p-4 mb-6 border-[var(--flag)] bg-[var(--flag-soft)] text-[var(--flag)] text-sm" x-text="erro"></div>
    </template>

    <template x-if="!carregando && !erro">
      <div>
        <div class="grid grid-cols-3 gap-4 mb-8">
          <div class="card p-5">
            <span class="font-display text-3xl font-semibold text-[var(--gold)]" x-text="metrics.pendentes"></span>
            <p class="text-xs text-[var(--muted)] uppercase tracking-wide mt-1">Pendentes</p>
          </div>
          <div class="card p-5">
            <span class="font-display text-3xl font-semibold" x-text="metrics.em_andamento"></span>
            <p class="text-xs text-[var(--muted)] uppercase tracking-wide mt-1">Em andamento</p>
          </div>
          <div class="card p-5">
            <span class="font-display text-3xl font-semibold text-[var(--evidence)]" x-text="metrics.concluidas"></span>
            <p class="text-xs text-[var(--muted)] uppercase tracking-wide mt-1">Concluídas</p>
          </div>
        </div>

        <h3 class="text-sm font-medium text-[var(--muted)] uppercase tracking-wide mb-3">Meus projetos</h3>
        <div class="card divide-y divide-[var(--hairline)] mb-8">
          <template x-if="projetos.length === 0">
            <p class="p-6 text-sm text-[var(--muted)]">Você ainda não está associado a nenhum projeto.</p>
          </template>
          <template x-for="p in projetos" :key="p.id">
            <button @click="abrirProjeto(p.id)" class="w-full text-left p-5 flex items-center justify-between hover:bg-[var(--paper)]">
              <div>
                <p class="font-medium" x-text="p.titulo"></p>
                <p class="text-xs text-[var(--muted)] mt-0.5" x-text="p.type === 'scientific' ? 'Caminho PRISMA' : 'Caminho GT2'"></p>
              </div>
              <span class="text-[var(--muted)]">→</span>
            </button>
          </template>
        </div>

        <template x-if="projetoSelecionado">
          <div>
            <h3 class="text-sm font-medium text-[var(--muted)] uppercase tracking-wide mb-3">
              Documentos atribuídos — <span x-text="projetoSelecionado.titulo"></span>
            </h3>
            <div class="card divide-y divide-[var(--hairline)]">
              <template x-if="atribuicoes.length === 0">
                <p class="p-6 text-sm text-[var(--muted)]">Nenhuma atribuição neste projeto ainda.</p>
              </template>
              <template x-for="a in atribuicoes" :key="a.id">
                <div class="p-5 flex items-center justify-between">
                  <div>
                    <p class="font-mono text-xs text-[var(--muted)]" x-text="a.id.slice(0,8)"></p>
                    <span class="badge mt-1 inline-block"
                      :class="{
                        'badge-gold': a.status === 'pendente',
                        'badge-evidence': a.status === 'concluido',
                      }"
                      x-text="a.status"></span>
                  </div>
                  <a :href="'avaliacao.html?atribuicao=' + a.id" class="btn-primary text-sm">
                    Abrir avaliação
                  </a>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </template>
  </div>

<script>
function reviewerDashboard() {
  return {
    carregando: true,
    erro: '',
    usuario: getUser(),
    metrics: { pendentes: 0, em_andamento: 0, concluidas: 0 },
    projetos: [],
    projetoSelecionado: null,
    atribuicoes: [],

    async load() {
      if (!getToken()) { window.location.href = '../index.html'; return; }
      this.carregando = true;
      this.erro = '';
      try {
        const [metrics, projetos] = await Promise.all([
          api.dashboardReviewer(),
          api.listProjects(),
        ]);
        this.metrics = metrics;
        this.projetos = projetos;
      } catch (e) {
        this.erro = e.message;
      } finally {
        this.carregando = false;
      }
    },

    async abrirProjeto(projetoId) {
      this.projetoSelecionado = this.projetos.find(p => p.id === projetoId);
      try {
        this.atribuicoes = await api.minhasAtribuicoes(projetoId);
      } catch (e) {
        this.erro = e.message;
      }
    },

    logout() { logout(); },
  };
}
</script>
</body>
</html>
