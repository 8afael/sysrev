<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<base href="/sysrev/">
<title>SysRev</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
<link rel="stylesheet" href="src/shared/style.css" />
<script src="src/shared/api.js"></script>

</head>
<body class="min-h-screen flex items-center justify-center px-6">

  <div class="w-full max-w-[420px]" x-data="loginForm()">

    <div class="mb-10 text-center">
      <h1 class="font-display text-3xl font-semibold">ReviewHub</h1>
      <p class="text-[var(--muted)] text-sm mt-1">Scientific &amp; Technical Analisys</p>
    </div>

    <form @submit.prevent="submit" class="card p-8 space-y-5">
      <div>
        <label class="block text-sm font-medium mb-1.5" for="email">Email</label>
        <input id="email" type="email" x-model="email" required autocomplete="username"
          class="w-full border border-[var(--hairline)] rounded-lg px-3.5 py-2.5 bg-white focus:border-[var(--evidence)] outline-none"
          placeholder="nome@instituicao.org" />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5" for="password">Password</label>
        <input id="password" type="password" x-model="password" required autocomplete="current-password"
          class="w-full border border-[var(--hairline)] rounded-lg px-3.5 py-2.5 bg-white focus:border-[var(--evidence)] outline-none"
          placeholder="••••••••" />
      </div>

      <p x-show="erro" x-text="erro" class="text-sm text-[var(--flag)]"></p>

      <button type="submit" :disabled="carregando"
        class="btn-primary w-full text-center disabled:opacity-60">
        <span x-show="!carregando">Login</span>
        <span x-show="carregando">Logging…</span>
      </button>
    </form>

    <p class="text-center text-xs text-[var(--muted)] mt-6">
      Alerthub. Cost.
    </p>
  </div>

<script>
function loginForm() {
  return {
    email: '', password: '', erro: '', carregando: false,
    async submit() {
      this.erro = '';
      this.carregando = true;
      try {
        const data = await api.login(this.email, this.password);
        setSession(data.access_token, { id: data.user_id, name: data.name, email: data.email }); 
        window.location.href = 'src/admin/dashboard_admin.html';
      } catch (e) {
        this.erro = e.message;
      } finally {
        this.carregando = false;
      }
    }
  };
}
</script>
</body>
</html>
