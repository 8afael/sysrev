services:
  db:
    image: postgres:16-alpine
    container_name: sysrev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - sysrev_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sysrev_backend:${APP_VERSION:-latest}
    container_name: sysrev_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ENVIRONMENT: "production"
      ROOT_PATH: "/sysrev/api"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:9500:9500"
    networks:
      - sysrev_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: sysrev_frontend:${APP_VERSION:-latest}
    container_name: sysrev_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:9501:80"
    networks:
      - sysrev_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:

networks:
  sysrev_net:
    driver: bridge