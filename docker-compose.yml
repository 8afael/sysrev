services:
  db:
    image: postgres:16-alpine
    container_name: sysrev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: sysrev_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ENVIRONMENT: "development"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9500:9500"
    volumes:
      - ./backend:/app
      - ./frontend/static:/app/static
      - ./reviewhub.json:/app/reviewhub.json
    command: uvicorn app.main:app --host 0.0.0.0 --port 9500 --reload

  frontend:
    build:
      context: ./frontend
      target: dev            # troca para "dev" localmente
    container_name: sysrev_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "9501:80"
      #- "9501:5173"
    volumes:
      - ./frontend:/srv/sysrev
      - ./frontend/Caddyfile:/etc/caddy/Caddyfile
      #- ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  pgdata: