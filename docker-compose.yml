services:
  db:
    image: postgres:16-alpine
    container_name: sysrev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sysrev_user
      POSTGRES_PASSWORD: sysrev_pass
      POSTGRES_DB: sysrev_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sysrev_user -d sysrev_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: sysrev_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://sysrev_user:sysrev_pass@db:5432/sysrev_db
      SECRET_KEY: "troque-esta-chave-em-producao"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ENVIRONMENT: "development"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9500:9500"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 9500 --reload

  frontend:
    build: ./frontend
    container_name: sysrev_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "9501:80"

volumes:
  pgdata: